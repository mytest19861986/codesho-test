services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: codesho
      POSTGRES_USER: codesho_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-codesho-admin-local}
      CODESHO_MIGRATOR_PASSWORD: ${CODESHO_MIGRATOR_PASSWORD:-codesho-migrator-local}
      CODESHO_RUNTIME_PASSWORD: ${CODESHO_RUNTIME_PASSWORD:-codesho-runtime-local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesho_admin -d codesho"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrator:
    build: ./backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.compose
      DATABASE_URL: ${DATABASE_MIGRATOR_URL:?DATABASE_MIGRATOR_URL is required}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: ["python", "manage.py", "migrate", "--noinput"]
    restart: "no"

  backend:
    build: ./backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.compose
      DATABASE_URL: ${DATABASE_RUNTIME_URL:?DATABASE_RUNTIME_URL is required}
    depends_on:
      migrator: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2", "--threads", "2", "--timeout", "60"]
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.compose
      DATABASE_URL: ${DATABASE_RUNTIME_URL:?DATABASE_RUNTIME_URL is required}
    depends_on:
      migrator: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    command: ["celery", "-A", "config", "worker", "--loglevel=INFO", "--concurrency=2"]
    restart: unless-stopped

  beat:
    build: ./backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.compose
      DATABASE_URL: ${DATABASE_RUNTIME_URL:?DATABASE_RUNTIME_URL is required}
    depends_on:
      migrator: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    command: ["celery", "-A", "config", "beat", "--loglevel=INFO"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:${NGINX_HOST_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
