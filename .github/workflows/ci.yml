name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: codesho
          POSTGRES_USER: codesho_admin
          POSTGRES_PASSWORD: admin-test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U codesho_admin -d codesho"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-only
      DATABASE_RUNTIME_URL: postgresql://codesho_runtime:runtime-test@localhost:5432/codesho
      DATABASE_MIGRATOR_URL: postgresql://codesho_migrator:migrator-test@localhost:5432/codesho
      DATABASE_RUNTIME_TEST_URL: postgresql://codesho_runtime:runtime-test@localhost:5432/codesho_test
      DATABASE_MIGRATOR_TEST_URL: postgresql://codesho_migrator:migrator-test@localhost:5432/codesho_test
      DATABASE_TEST_NAME: codesho_test
      CELERY_BROKER_URL: redis://localhost:6379/1
      REDIS_URL: redis://localhost:6379/0
      PASSCODE_SIGNAL_HMAC_KEY: c2lnbmFsLWhtYWMta2V5LXgteHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHg=
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Configure migrator and runtime roles
        env:
          PGPASSWORD: admin-test
          POSTGRES_ADMIN_URL: postgresql://codesho_admin:admin-test@localhost:5432/codesho
          CODESHO_MIGRATOR_PASSWORD: migrator-test
          CODESHO_RUNTIME_PASSWORD: runtime-test
        run: |
          sh ../scripts/configure-postgres-roles.sh
          psql -h localhost -U codesho_admin -d codesho -v ON_ERROR_STOP=1 -c "CREATE DATABASE codesho_test OWNER codesho_migrator;"
          POSTGRES_ADMIN_URL=postgresql://codesho_admin:admin-test@localhost:5432/codesho_test sh ../scripts/configure-postgres-roles.sh
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: mypy .
      - run: python ../scripts/check_module_boundaries.py
      - run: python manage.py makemigrations --check --dry-run
      - run: DATABASE_URL="$DATABASE_MIGRATOR_URL" python manage.py migrate --noinput
      - run: DATABASE_URL="$DATABASE_MIGRATOR_TEST_URL" python manage.py migrate --noinput
      - run: DATABASE_URL="$DATABASE_RUNTIME_URL" python manage.py spectacular --file openapi.yaml --validate
      - name: Run backend tests with failure annotation
        run: |
          set +e
          DATABASE_URL="$DATABASE_RUNTIME_URL" pytest --reuse-db --cov=modules --cov-report=term-missing --cov-fail-under=80 2>&1 | tee /tmp/backend-pytest.log
          status="${PIPESTATUS[0]}"
          if [ "$status" -ne 0 ]; then
            summary="$(tail -n 30 /tmp/backend-pytest.log | tr '\n' ' ' | sed 's/::/%3A%3A/g')"
            echo "::error title=backend pytest failure::$summary"
            exit "$status"
          fi

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
