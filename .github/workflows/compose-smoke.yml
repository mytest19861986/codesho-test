name: Compose smoke and restore

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke_restore:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      COMPOSE_PROJECT_NAME: codesho-sz-smoke
      NGINX_HOST_PORT: "8080"
    steps:
      - uses: actions/checkout@v4
      - name: Prepare isolated smoke environment
        run: |
          cp .env.example .env
          printf '\nNGINX_HOST_PORT=%s\n' "$NGINX_HOST_PORT" >> .env
          mkdir -p artifacts
      - name: Validate Compose configuration
        run: docker compose config -q
      - name: Build and start the complete stack
        run: docker compose up --build --detach --wait --wait-timeout 180
      - name: Verify Nginx routes and service dependencies
        run: |
          for path in / /health/live/ /health/ready/ /api/schema/ /api/schema/swagger-ui/; do
            curl --fail --show-error --silent --retry 12 --retry-all-errors \
              "http://127.0.0.1:${NGINX_HOST_PORT}${path}" > /dev/null
          done
          docker compose exec --no-TTY postgres sh -ec \
            'PGPASSWORD="$POSTGRES_PASSWORD" psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -c "SELECT 1;"'
          docker compose exec --no-TTY redis redis-cli ping | grep -Fx PONG
          docker compose exec --no-TTY worker celery -A config inspect ping --timeout 10 | grep -F pong
      - name: Run PostgreSQL RLS and connection-reuse tests in the Compose network
        run: |
          docker compose exec --no-TTY postgres sh -ec \
            'PGPASSWORD="$POSTGRES_PASSWORD" psql -U "$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE codesho_smoke_tests OWNER codesho_app;"'
          docker compose exec --no-TTY postgres sh -ec \
            'PGPASSWORD="$POSTGRES_PASSWORD" psql -U "$POSTGRES_USER" -d codesho_smoke_tests -v ON_ERROR_STOP=1 -c "CREATE SCHEMA codesho AUTHORIZATION codesho_app;"'
          docker run --rm --network codesho-sz-smoke_default \
            --volume "$GITHUB_WORKSPACE/backend:/app" --workdir /app \
            --env DJANGO_SETTINGS_MODULE=config.settings.test \
            --env DJANGO_SECRET_KEY=compose-smoke-only \
            --env DATABASE_URL=postgresql://codesho_app:codesho@postgres:5432/codesho \
            --env DATABASE_TEST_NAME=codesho_smoke_tests \
            python:3.12-slim sh -ec \
            "pip install -e '.[dev]' && pytest --reuse-db -q tests/test_tenant_context.py tests/test_middleware.py tests/test_tasks.py"
      - name: Create, restore, and verify a PostgreSQL backup
        run: |
          backup_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          backup_started_epoch="$(date +%s)"
          docker compose exec --no-TTY -e PGPASSWORD=codesho-admin-local postgres pg_dump -h 127.0.0.1 -U codesho_admin -d codesho --format=custom --no-owner --no-acl > artifacts/codesho.dump 2>artifacts/pg_dump.stderr || { msg="$(tr '\n' ' ' < artifacts/pg_dump.stderr)"; echo "::error title=pg_dump::$msg"; exit 1; }
          test -s artifacts/codesho.dump
          backup_finished_epoch="$(date +%s)"
          restore_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          restore_started_epoch="$(date +%s)"
          docker compose exec --no-TTY -e PGPASSWORD=codesho-admin-local postgres createdb -h 127.0.0.1 -U codesho_admin -O codesho_app codesho_restore_verify 2>artifacts/create_db.stderr || { msg="$(tr '\n' ' ' < artifacts/create_db.stderr)"; echo "::error title=create_db::$msg"; exit 1; }
          docker compose exec --no-TTY -e PGPASSWORD=codesho-admin-local postgres pg_restore -h 127.0.0.1 -U codesho_admin --clean --if-exists --no-owner --no-acl --dbname codesho_restore_verify < artifacts/codesho.dump
          docker compose exec --no-TTY -e PGPASSWORD=codesho-admin-local postgres psql -h 127.0.0.1 -U codesho_admin -d codesho_restore_verify -v ON_ERROR_STOP=1 -c "SELECT 1; SELECT COUNT(*) AS migration_count FROM django_migrations;"
          restore_finished_epoch="$(date +%s)"
          cat > artifacts/restore-drill.md <<EOF
          # Compose Restore Drill

          - Backup started: $backup_started_at
          - Restore started: $restore_started_at
          - Backup duration: $((backup_finished_epoch - backup_started_epoch)) seconds
          - Restore duration: $((restore_finished_epoch - restore_started_epoch)) seconds
          - Observed RPO: 0 seconds at the logical dump snapshot boundary
          - Verified target: isolated `codesho_restore_verify` database
          EOF
      - name: Collect logs
        if: always()
        run: docker compose logs --no-color > artifacts/compose.log
      - name: Upload smoke and restore evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-restore-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
      - name: Remove only the isolated smoke environment
        if: always()
        run: docker compose down --volumes --remove-orphans
